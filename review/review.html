<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Editplan Review</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 0; background:#111; color:#eee; }
    header { padding:12px 16px; background:#1c1c22; display:flex; gap:12px; align-items:center; }
    h1 { font-size:16px; margin:0; }
    main { display:grid; grid-template-columns: 1fr 1fr; gap:16px; padding:16px; }
    .card { background:#1c1c22; border-radius:8px; padding:12px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th,td { text-align:left; padding:6px 8px; border-bottom:1px solid #333; }
    img { width:64px; height:64px; object-fit:cover; border-radius:6px; background:#333; }
    .tier { font-weight:800; padding:2px 8px; border-radius:4px; color:#111; }
    button { background:#3b82f6; color:#fff; border:0; padding:8px 14px; border-radius:6px; cursor:pointer; }
    .muted { color:#888; }
    code { color:#9cf; }
  </style>
</head>
<body>
  <header>
    <h1>Editplan Review</h1>
    <input type="file" id="file" accept="application/json" />
    <span class="muted">load <code>render/public/&lt;id&gt;/editplan.json</code></span>
  </header>
  <main id="app"><div class="card muted">No editplan loaded.</div></main>
  <script>
    const tierColors = {};
    document.getElementById('file').addEventListener('change', async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const plan = JSON.parse(await f.text());
      render(plan, f);
    });

    function render(plan, file) {
      (plan.tiers || []).forEach(t => tierColors[t.label.toUpperCase()] = t.color);
      const app = document.getElementById('app');
      app.innerHTML = '';

      const meta = document.createElement('div');
      meta.className = 'card';
      meta.innerHTML = `<h3>${plan.videoId}</h3>
        <div class="muted">${plan.width}×${plan.height} · ${plan.fps}fps · ${(plan.durationInFrames/plan.fps).toFixed(1)}s ·
        ${plan.items.length} items · ${plan.captions.length} captions</div>
        <div style="margin-top:8px">Tiers: ${(plan.tiers||[]).map(t=>tierChip(t.label)).join(' ')}</div>`;
      app.appendChild(meta);

      const itemsCard = document.createElement('div');
      itemsCard.className = 'card';
      const rows = plan.items.map(it => `<tr>
        <td>${it.image ? `<img src="../render/public/${it.image}" onerror="this.style.opacity=.2">` : '<span class="muted">none</span>'}</td>
        <td>${it.name}</td>
        <td>${tierChip(it.tier)}</td>
        <td>${(it.introFrame/plan.fps).toFixed(1)}s</td>
        <td>${(it.ratedFrame/plan.fps).toFixed(1)}s</td>
        <td>#${it.slotIndex}</td>
      </tr>`).join('');
      itemsCard.innerHTML = `<h3>Items</h3><table>
        <tr><th>img</th><th>name</th><th>tier</th><th>intro</th><th>rated</th><th>slot</th></tr>${rows}</table>
        <p class="muted">Edit the JSON file directly to fix mistakes, then re-render.</p>`;
      app.appendChild(itemsCard);
    }

    function tierChip(label) {
      const c = tierColors[String(label).toUpperCase()] || '#888';
      return `<span class="tier" style="background:${c}">${label}</span>`;
    }
  </script>
</body>
</html>
