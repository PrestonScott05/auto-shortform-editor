<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Editplan Editor</title>
  <style>
    :root { --bg:#111; --card:#1c1c22; --line:#333; --accent:#3b82f6; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, Arial, sans-serif; margin: 0; background: var(--bg); color: #eee; }
    header { padding: 12px 16px; background: var(--card); display: flex; gap: 12px; align-items: center; position: sticky; top: 0; z-index: 5; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
    h1 { font-size: 15px; margin: 0; }
    h3 { margin: 0 0 10px; font-size: 14px; }
    main { display: grid; grid-template-columns: 340px 1fr; gap: 16px; padding: 16px; align-items: start; }
    .card { background: var(--card); border-radius: 8px; padding: 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
    img.thumb { width: 72px; height: 72px; object-fit: contain; border-radius: 6px; background: #333; display: block; }
    .tier { font-weight: 800; padding: 2px 8px; border-radius: 4px; color: #111; }
    button { background: var(--accent); color: #fff; border: 0; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    button.secondary { background: #333; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    input, select { background: #0e0e12; color: #eee; border: 1px solid var(--line); border-radius: 5px; padding: 6px 8px; font-size: 12px; width: 100%; }
    input[type=color] { padding: 2px; height: 34px; }
    input[type=checkbox] { width: auto; }
    label.row { display: grid; grid-template-columns: 110px 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
    .bulkrow { display: grid; grid-template-columns: 22px 120px 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
    .muted { color: #888; }
    code { color: #9cf; }
    .imgcell { display: flex; gap: 8px; align-items: flex-start; }
    .imgctl { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .preview { border-radius: 8px; padding: 18px 10px; text-align: center; background: linear-gradient(#2b2b33,#17171c); margin-top: 10px; }
    .swatch { display: inline-block; width: 14px; height: 14px; border-radius: 3px; vertical-align: middle; margin-right: 4px; border: 1px solid #555; }
    .divider { border: 0; border-top: 1px solid var(--line); margin: 16px 0; }
    .status { font-size: 12px; margin-top: 8px; min-height: 16px; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="muted" style="text-decoration:none;font-size:13px">&larr; Home</a>
    <h1>Editplan Editor</h1>
    <input type="file" id="file" accept="application/json" />
    <button id="loadAllBtn" class="secondary">Load all videos (bulk)</button>
    <button id="loadFolderBtn" class="secondary">Load folder (bulk)</button>
    <input type="file" id="folderFallback" webkitdirectory multiple style="display:none">
    <span id="vid" class="muted">load <code>render/public/&lt;id&gt;/editplan.json</code></span>
    <span style="flex:1"></span>
    <span id="saveStatus" class="muted" style="font-size:12px"></span>
    <button id="save" class="secondary" disabled>Save</button>
    <button id="download" disabled>Download editplan.json</button>
  </header>
  <main id="app"><div class="card muted">No editplan loaded.</div></main>

  <script>
    // ============================= single-video mode =============================
    let plan = null, fileName = "editplan.json";
    const tierColors = {};

    document.getElementById('file').addEventListener('change', async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      fileName = f.name || "editplan.json";
      plan = JSON.parse(await f.text());
      loadedSingle();
    });

    function loadedSingle() {
      (plan.tiers || []).forEach(t => tierColors[t.label.toUpperCase()] = t.color);
      document.getElementById('vid').textContent = plan.videoId;
      document.getElementById('download').disabled = false;
      document.getElementById('save').disabled = false;
      renderSingle();
    }

    // If opened as /review/review.html?id=<videoId> (from the dashboard), load it directly —
    // no file picker needed.
    (async () => {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) return;
      try {
        const res = await fetch(`/render/public/${id}/editplan.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        plan = await res.json();
        fileName = 'editplan.json';
        loadedSingle();
      } catch (err) {
        document.getElementById('vid').textContent = `failed to load '${id}': ${err.message}`;
      }
    })();

    document.getElementById('download').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(plan, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'editplan.json';
      a.click();
      URL.revokeObjectURL(a.href);
    });

    // Save directly through the dashboard server (works when served over http(s); browsers
    // block file writes when opened as a raw file:// page — use Download there instead).
    async function saveToServer(id, planObj) {
      const res = await fetch(`/api/editplan/${id}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(planObj),
      });
      if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || `HTTP ${res.status}`);
    }

    document.getElementById('save').addEventListener('click', async () => {
      const status = document.getElementById('saveStatus');
      status.textContent = 'Saving…';
      try {
        await saveToServer(plan.videoId, plan);
        status.textContent = 'Saved. Refresh Remotion Studio (Ctrl+Shift+R) to preview.';
      } catch (err) {
        status.textContent = `Save failed (${err.message}) — opened as a file? Use Download instead.`;
      }
    });

    // Resolve an image value for preview: absolute URL/data URI as-is, else served from public/.
    function previewSrc(image) {
      if (!image) return '';
      return /^(https?:|data:|blob:|file:)/.test(image) ? image : `../render/public/${image}`;
    }
    function tierChip(label) {
      const c = tierColors[String(label).toUpperCase()] || '#888';
      return `<span class="tier" style="background:${c}">${label}</span>`;
    }

    function renderSingle() {
      const app = document.getElementById('app');
      const L = plan.layout;
      app.innerHTML = '';

      // ---- Left column: caption style + meta ----
      const left = document.createElement('div');
      left.className = 'card';
      left.innerHTML = `
        <h3>Caption style</h3>
        <label class="row"><span>Text color</span><input type="color" id="capColor" value="${L.captionColor || '#FFFFFF'}"></label>
        <label class="row"><span>Highlight</span><input type="color" id="capActive" value="${L.captionActiveColor || '#FFE14D'}"></label>
        <label class="row"><span>Font</span>
          <select id="capFont">
            ${fontOptions(L.captionFont)}
          </select>
        </label>
        <label class="row"><span>Size (px)</span><input type="number" id="capSize" min="16" max="120" value="${L.captionSize || 44}"></label>
        <div class="preview" id="capPreview"></div>
        <h3 style="margin-top:16px">Framing</h3>
        <label class="row"><span>Head Y (px)</span><input type="number" id="vy" min="-500" max="300" step="5" value="${L.videoTranslateY}"></label>
        <div class="muted" style="font-size:11px;margin-top:-4px">Negative moves the video up so the head clears the board. Re-render to see it.</div>
        <h3 style="margin-top:16px">Video</h3>
        <div class="muted" style="font-size:12px">
          ${plan.width}×${plan.height} · ${plan.fps}fps · ${(plan.durationInFrames/plan.fps).toFixed(1)}s<br>
          ${plan.items.length} items · ${plan.captions.length} captions
        </div>`;
      app.appendChild(left);

      // ---- Right column: items ----
      const right = document.createElement('div');
      right.className = 'card';
      right.innerHTML = `<h3>Items — swap photos</h3>
        <table><thead><tr><th>image</th><th>name</th><th>tier</th><th>time</th></tr></thead>
        <tbody id="items"></tbody></table>
        <p class="muted">Paste an image URL or upload a file to replace a photo. Then click
        <b>Download editplan.json</b> and drop it back into <code>render/public/${plan.videoId}/</code>.</p>`;
      app.appendChild(right);

      const tbody = right.querySelector('#items');
      plan.items.forEach((it, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div class="imgcell">
              <img class="thumb" id="thumb${i}" src="${previewSrc(it.image)}" onerror="this.style.opacity=.2">
              <div class="imgctl">
                <input type="text" id="url${i}" placeholder="image URL…" value="${it.image && /^https?:/.test(it.image) ? it.image : ''}">
                <input type="file" id="up${i}" accept="image/*">
              </div>
            </div>
          </td>
          <td>${it.name}</td>
          <td><select id="tier${i}">${tierOptions(it.tier)}</select></td>
          <td class="muted">${(it.introFrame/plan.fps).toFixed(1)}→${(it.ratedFrame/plan.fps).toFixed(1)}s</td>`;
        tbody.appendChild(tr);

        tr.querySelector(`#url${i}`).addEventListener('change', (e) => {
          const v = e.target.value.trim();
          if (v) { it.image = v; document.getElementById(`thumb${i}`).src = previewSrc(v); document.getElementById(`thumb${i}`).style.opacity = 1; }
        });
        tr.querySelector(`#up${i}`).addEventListener('change', (e) => {
          const f = e.target.files[0];
          if (!f) return;
          const reader = new FileReader();
          reader.onload = () => { it.image = reader.result; document.getElementById(`thumb${i}`).src = reader.result; document.getElementById(`thumb${i}`).style.opacity = 1; };
          reader.readAsDataURL(f);
        });
        tr.querySelector(`#tier${i}`).addEventListener('change', (e) => { it.tier = e.target.value; });
      });

      // caption controls -> plan.layout + live preview
      const bind = (id, key, cast = (v) => v) => {
        document.getElementById(id).addEventListener('input', (e) => { plan.layout[key] = cast(e.target.value); paintPreview(); });
      };
      bind('capColor', 'captionColor');
      bind('capActive', 'captionActiveColor');
      bind('capFont', 'captionFont');
      bind('capSize', 'captionSize', (v) => Number(v));
      document.getElementById('vy').addEventListener('input', (e) => { plan.layout.videoTranslateY = Number(e.target.value); });
      paintPreview();
    }

    function paintPreview() {
      const L = plan.layout;
      const el = document.getElementById('capPreview');
      if (!el) return;
      el.innerHTML = `<span style="font-family:${L.captionFont};font-weight:900;font-size:${L.captionSize}px;
        color:${L.captionActiveColor};-webkit-text-stroke:6px #000;paint-order:stroke fill;text-transform:uppercase">THIS</span>
        <span style="font-family:${L.captionFont};font-weight:900;font-size:${L.captionSize}px;
        color:${L.captionColor};-webkit-text-stroke:6px #000;paint-order:stroke fill;text-transform:uppercase">IS EASILY</span>`;
    }

    function tierOptions(sel) {
      return (plan.tiers || []).map(t => `<option value="${t.label}" ${t.label === sel ? 'selected' : ''}>${t.label}</option>`).join('');
    }
    function fontOptions(sel) {
      const fonts = [
        "Arial Black, Arial, sans-serif", "Impact, sans-serif", "Georgia, serif",
        "'Comic Sans MS', cursive", "'Courier New', monospace", "Verdana, sans-serif",
        "'Trebuchet MS', sans-serif", "Tahoma, sans-serif"
      ];
      if (sel && !fonts.includes(sel)) fonts.unshift(sel);
      return fonts.map(f => `<option value="${f}" ${f === sel ? 'selected' : ''}>${f.split(',')[0].replace(/'/g,'')}</option>`).join('');
    }

    // ============================== bulk (folder) mode ==============================
    // Layout-only: framing + caption style. Never touches items/images/tiers/timings —
    // those are video-specific and stay per-video (use single-file mode for those).
    const BULK_FIELDS = [
      { key: 'videoTranslateY',      label: 'Head Y (px)',        type: 'number', step: 5,    default: -115 },
      { key: 'videoScale',           label: 'Video scale',        type: 'number', step: 0.05, default: 1.0 },
      { key: 'boardTopRatio',        label: 'Board top (0-1)',    type: 'number', step: 0.01, default: 0.57 },
      { key: 'captionBaselineRatio', label: 'Caption Y (0-1)',    type: 'number', step: 0.01, default: 0.44 },
      { key: 'captionColor',         label: 'Caption color',      type: 'color',              default: '#FFFFFF' },
      { key: 'captionActiveColor',   label: 'Caption highlight',  type: 'color',              default: '#FFE14D' },
      { key: 'captionFont',          label: 'Caption font',       type: 'font',                default: 'Arial Black, Arial, sans-serif' },
      { key: 'captionSize',          label: 'Caption size (px)',  type: 'number', step: 2,    default: 44 },
      { key: 'showCaptions',         label: 'Show captions',      type: 'bool',                default: true },
    ];

    // bulk.plans: [{ id, plan, handle? }]  handle = FileSystemFileHandle when write access is available.
    let bulk = { plans: [], canWrite: false };
    let lastAppliedPatch = {};

    document.getElementById('loadFolderBtn').addEventListener('click', async () => {
      if (window.showDirectoryPicker) {
        try {
          const dir = await window.showDirectoryPicker({ mode: 'readwrite' });
          const plans = [];
          await walkForEditplans(dir, 0, 3, plans);
          if (!plans.length) { alert('No editplan.json files found under that folder.'); return; }
          bulk = { plans, canWrite: true };
          loadedFolder();
          return;
        } catch (err) {
          if (err && err.name === 'AbortError') return; // user cancelled the picker
          console.warn('Directory picker failed, falling back to read-only folder input:', err);
        }
      }
      document.getElementById('folderFallback').click();
    });

    async function walkForEditplans(dirHandle, depth, maxDepth, out) {
      for await (const [name, handle] of dirHandle.entries()) {
        if (handle.kind === 'file' && name === 'editplan.json') {
          const plan = JSON.parse(await (await handle.getFile()).text());
          out.push({ id: plan.videoId || dirHandle.name, plan, handle });
        } else if (handle.kind === 'directory' && depth < maxDepth) {
          await walkForEditplans(handle, depth + 1, maxDepth, out);
        }
      }
    }

    // Read-only fallback for browsers without the File System Access API (e.g. Firefox).
    document.getElementById('folderFallback').addEventListener('change', async (e) => {
      const files = [...e.target.files].filter(f => f.name === 'editplan.json');
      if (!files.length) { alert('No editplan.json files found under that folder.'); return; }
      const plans = [];
      for (const f of files) {
        const plan = JSON.parse(await f.text());
        const parts = (f.webkitRelativePath || f.name).split('/');
        const id = plan.videoId || parts[parts.length - 2] || f.name;
        plans.push({ id, plan, handle: null });
      }
      bulk = { plans, canWrite: false };
      loadedFolder();
    });

    // Load every video's editplan straight from the dashboard server — no folder picker,
    // works in any browser, always available when the server is running.
    document.getElementById('loadAllBtn').addEventListener('click', async () => {
      try {
        const list = await fetch('/api/videos').then(r => r.json());
        const plans = [];
        for (const v of list) {
          if (!v.stages.editplan) continue;
          const plan = await fetch(`/render/public/${v.id}/editplan.json`).then(r => r.json());
          plans.push({ id: v.id, plan, handle: null });
        }
        if (!plans.length) { alert('No editplans found yet — run the pipeline first.'); return; }
        bulk = { plans, canWrite: false };
        loadedFolder();
      } catch (err) {
        alert(`Could not reach the dashboard server (${err.message}). Use "Load folder (bulk)" instead.`);
      }
    });

    function loadedFolder() {
      document.getElementById('vid').textContent = `${bulk.plans.length} video(s) loaded (bulk)`;
      document.getElementById('download').disabled = true; // single-file download not applicable in bulk mode
      document.getElementById('save').disabled = true;
      renderBulk();
    }

    function renderBulk() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      const left = document.createElement('div');
      left.className = 'card';
      left.innerHTML = `<h3>Bulk layout changes</h3>
        <p class="muted" style="font-size:12px;margin-top:-4px">
          Check a field, set a value, then <b>Apply</b>. Only checked fields change.
          Items, images, tiers, and timings are never touched — they stay per-video.
        </p>
        <div id="bulkFields"></div>
        <button id="bulkApply">Apply to ${bulk.plans.length} loaded</button>
        <div class="status" id="bulkStatus"></div>
        <hr class="divider">
        <button id="bulkSave" class="secondary">Save all</button>
        <button id="bulkDownload" class="secondary">Download patch (.json)</button>
        <div class="muted" style="font-size:11px;margin-top:8px">
          Save tries the dashboard server first (works regardless of browser or how the
          folder was loaded); falls back to direct folder write if the server isn't
          reachable and this browser granted write access. If neither works, download the
          patch and run:<br><code>python pipeline\\apply_bulk_layout.py bulk-layout-patch.json</code>
        </div>`;
      app.appendChild(left);

      const fieldsEl = left.querySelector('#bulkFields');
      const sample = bulk.plans[0]?.plan?.layout || {};
      BULK_FIELDS.forEach(f => {
        const cur = sample[f.key] !== undefined ? sample[f.key] : f.default;
        let input;
        if (f.type === 'color') {
          input = `<input type="color" id="val_${f.key}" value="${cur}">`;
        } else if (f.type === 'bool') {
          input = `<select id="val_${f.key}"><option value="true" ${cur ? 'selected' : ''}>Yes</option><option value="false" ${!cur ? 'selected' : ''}>No</option></select>`;
        } else if (f.type === 'font') {
          input = `<select id="val_${f.key}">${fontOptions(cur)}</select>`;
        } else {
          input = `<input type="number" id="val_${f.key}" step="${f.step}" value="${cur}">`;
        }
        const row = document.createElement('div');
        row.className = 'bulkrow';
        row.innerHTML = `<input type="checkbox" id="inc_${f.key}"><span>${f.label}</span>${input}`;
        fieldsEl.appendChild(row);
      });

      const right = document.createElement('div');
      right.className = 'card';
      right.innerHTML = `<h3>Loaded videos</h3>
        <table><thead><tr><th>id</th><th>Head Y</th><th>board top</th><th>caption</th></tr></thead>
        <tbody id="bulkTable"></tbody></table>`;
      app.appendChild(right);
      paintBulkTable();

      left.querySelector('#bulkApply').addEventListener('click', () => {
        const patch = {};
        BULK_FIELDS.forEach(f => {
          if (!document.getElementById(`inc_${f.key}`).checked) return;
          const raw = document.getElementById(`val_${f.key}`).value;
          patch[f.key] = f.type === 'number' ? Number(raw) : f.type === 'bool' ? raw === 'true' : raw;
        });
        if (!Object.keys(patch).length) {
          document.getElementById('bulkStatus').textContent = 'Check at least one field first.';
          return;
        }
        bulk.plans.forEach(p => { p.plan.layout = { ...p.plan.layout, ...patch }; });
        lastAppliedPatch = patch;
        document.getElementById('bulkStatus').textContent = `Applied ${JSON.stringify(patch)} to ${bulk.plans.length} plan(s) in memory. Save or download to persist.`;
        paintBulkTable();
      });

      left.querySelector('#bulkSave').addEventListener('click', async () => {
        const status = document.getElementById('bulkStatus');
        status.textContent = 'Saving…';
        let serverOk = 0, fsOk = 0, failed = 0;
        for (const p of bulk.plans) {
          try {
            await saveToServer(p.id, p.plan);
            serverOk++;
            continue;
          } catch (err) {
            // Server unreachable (e.g. opened as a raw file) — fall back to a direct folder
            // write if this browser granted one.
          }
          if (p.handle) {
            try {
              const w = await p.handle.createWritable();
              await w.write(JSON.stringify(p.plan, null, 2));
              await w.close();
              fsOk++;
              continue;
            } catch (err) { console.error(`failed to save ${p.id} via folder handle:`, err); }
          }
          failed++;
        }
        const parts = [];
        if (serverOk) parts.push(`${serverOk} via server`);
        if (fsOk) parts.push(`${fsOk} via folder write`);
        if (failed) parts.push(`${failed} failed (use Download patch instead)`);
        status.textContent = `Saved: ${parts.join(', ')}. Refresh Remotion Studio (Ctrl+Shift+R).`;
      });

      left.querySelector('#bulkDownload').addEventListener('click', () => {
        const patch = Object.keys(lastAppliedPatch).length ? lastAppliedPatch : (() => {
          const p = {};
          BULK_FIELDS.forEach(f => {
            if (!document.getElementById(`inc_${f.key}`).checked) return;
            const raw = document.getElementById(`val_${f.key}`).value;
            p[f.key] = f.type === 'number' ? Number(raw) : f.type === 'bool' ? raw === 'true' : raw;
          });
          return p;
        })();
        if (!Object.keys(patch).length) {
          document.getElementById('bulkStatus').textContent = 'Check at least one field first.';
          return;
        }
        const blob = new Blob([JSON.stringify({ layout: patch }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'bulk-layout-patch.json';
        a.click();
        URL.revokeObjectURL(a.href);
      });
    }

    function paintBulkTable() {
      const tbody = document.getElementById('bulkTable');
      if (!tbody) return;
      tbody.innerHTML = bulk.plans.map(p => {
        const L = p.plan.layout || {};
        return `<tr>
          <td>${p.id.slice(0, 12)}</td>
          <td>${L.videoTranslateY}</td>
          <td>${L.boardTopRatio}</td>
          <td><span class="swatch" style="background:${L.captionColor || '#fff'}"></span>${L.captionSize || ''}px</td>
        </tr>`;
      }).join('');
    }
  </script>
</body>
</html>
